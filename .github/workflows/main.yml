name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ap-south-1

      # Step 3: Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 700918785571.dkr.ecr.ap-south-1.amazonaws.com

      # Step 4: Build Docker image
      - name: Build Docker image
        run: docker build -t cloudcamp-app .

      # Step 5: Tag image
      - name: Tag Docker image
        run: docker tag cloudcamp-app:latest 700918785571.dkr.ecr.ap-south-1.amazonaws.com/cloudmap/app:latest

      # Step 6: Push image to ECR
      - name: Push to ECR
        run: docker push 700918785571.dkr.ecr.ap-south-1.amazonaws.com/cloudmap/app:latest
